<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hans Rosling</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:        #f5f4f0;
  --surface:   #ffffff;
  --ink:       #1c1b18;
  --ink-soft:  #6b6962;
  --ink-faint: #c4c2bc;
  --green:     #2d8a4e;
  --red:       #c0392b;
  --blue:      #2471a3;
  --green-abs: #1e8449;
  --accent:    #e67e22;
  --border:    #e2e0da;
  --grid:      #eae8e2;
  --r:         5px;
  --fhead:     'Playfair Display', Georgia, serif;
  --fbody:     'DM Sans', sans-serif;
  --fmono:     'DM Mono', monospace;
}

html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--ink); font-family:var(--fbody); }

#app { height:100vh; display:flex; flex-direction:column; }

/* ── HEADER ─────────────────────────────────────────────── */
header {
  background:var(--surface);
  border-bottom:1.5px solid var(--border);
  padding:0 28px;
  height:54px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}

.brand { display:flex; align-items:baseline; gap:11px; }
.brand h1 { font-family:var(--fhead); font-size:1.35rem; font-weight:700; color:var(--ink); }
.brand .sub { font-size:.68rem; font-weight:300; color:var(--ink-soft); letter-spacing:.1em; text-transform:uppercase; }

.controls { display:flex; align-items:center; gap:20px; }

.toggle-group { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
.toggle-group > span { font-size:.75rem; color:var(--ink-soft); }

.switch { position:relative; width:38px; height:21px; }
.switch input { opacity:0; width:0; height:0; position:absolute; }
.track { position:absolute; inset:0; background:var(--ink-faint); border-radius:21px; transition:background .25s; cursor:pointer; }
.track::after { content:''; position:absolute; width:15px; height:15px; top:3px; left:3px; background:#fff; border-radius:50%; transition:transform .25s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
.switch input:checked ~ .track { background:var(--blue); }
.switch input:checked ~ .track::after { transform:translateX(17px); }

.btn-update {
  height:32px; padding:0 16px;
  background:var(--ink); color:#fff;
  border:none; border-radius:var(--r);
  font-family:var(--fbody); font-size:.75rem; font-weight:500; letter-spacing:.04em;
  cursor:pointer; transition:opacity .2s, transform .1s; white-space:nowrap;
}
.btn-update:hover  { opacity:.82; }
.btn-update:active { transform:scale(.97); }
.btn-update:disabled { opacity:.4; cursor:not-allowed; }

/* ── STATUS ──────────────────────────────────────────────── */
#statusBar {
  height:28px; padding:0 28px;
  display:flex; align-items:center; gap:10px;
  background:var(--surface); border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#statusText { font-size:.7rem; color:var(--ink-soft); font-family:var(--fmono); }
.dot { width:6px; height:6px; border-radius:50%; background:var(--ink-faint); flex-shrink:0; }
.dot.ok   { background:var(--green); }
.dot.err  { background:var(--red); }
.dot.wait { background:var(--accent); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── CHART AREA ──────────────────────────────────────────── */
#chartArea {
  flex:1; min-height:0;
  display:flex;
  padding:96px 20px 0 12px;
}

/* Y-axis */
#yAxis {
  width:36px; flex-shrink:0;
  display:flex; flex-direction:column;
  justify-content:space-between;
  align-items:flex-end;
  padding-right:7px;
  /* bottom padding equals the label row height */
  padding-bottom:82px;
}
.y-tick { font-family:var(--fmono); font-size:.62rem; color:var(--ink-faint); line-height:1; }

/* Bars container */
#barsContainer { flex:1; min-width:0; display:flex; flex-direction:column; }

/* Grid + bars area */
#gridAndBars { flex:1; min-height:0; position:relative; }

.grid-line { position:absolute; left:0; right:0; height:1px; background:var(--grid); pointer-events:none; z-index:0; }

/* Row of bars — sits inside grid */
#barsRow {
  position:absolute; inset:0;
  display:flex;
  align-items:flex-end;
  gap:7px;
  padding:0 2px;
  z-index:1;
}

/* ── BAR COLUMN ──────────────────────────────────────────── */
.bar-col {
  flex:1; height:100%;
  display:flex; flex-direction:column;
  align-items:center;
  position:relative;
  min-width:0;
}

/* small number shown above the bar */
.val-above {
  font-family:var(--fmono); font-size:.62rem; color:var(--ink-soft);
  line-height:1; margin-bottom:3px; white-space:nowrap; flex-shrink:0; min-height:14px;
}

/* bar track */
.bar-track {
  width:100%; flex:1; min-height:0;
  position:relative; border-radius:var(--r); overflow:visible;
  background:#e4e2dc;
}

/* ── FILLS ───────────────────────────────────────────────── */
.fill-green {
  position:absolute; bottom:0; left:0; right:0;
  background:var(--green);
  border-radius:0 0 var(--r) var(--r);
  transition:height .6s cubic-bezier(.4,0,.2,1);
  display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
}

.fill-red {
  position:absolute; top:0; left:0; right:0;
  background:var(--red);
  background-image:repeating-linear-gradient(135deg,transparent 0,transparent 5px,rgba(0,0,0,.18) 5px,rgba(0,0,0,.18) 7px);
  border-radius:var(--r) var(--r) 0 0;
  transition:height .6s cubic-bezier(.4,0,.2,1);
  display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
}

.fill-abs {
  position:absolute; bottom:0; left:0; right:0;
  border-radius:var(--r);
  transition:height .6s cubic-bezier(.4,0,.2,1);
  display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
}
.fill-abs.q1-12 { background:var(--blue); }
.fill-abs.q13   { background:var(--green-abs); }

/* ── SEGMENT LABEL (centered inside each fill) ────────────── */
.seg-label {
  position:absolute;
  left:0; right:0;
  text-align:center;
  font-family:var(--fmono);
  font-size:1.05rem;
  font-weight:700;
  color:#fff;
  text-shadow:0 1px 6px rgba(0,0,0,.55);
  pointer-events:none;
  z-index:5;
  line-height:1;
  transform:translateY(-50%);
  white-space:nowrap;
}

/* ── Q13 ARROW ───────────────────────────────────────────── */
.q13-arrow {
  display:none; position:absolute; top:-88px; left:50%; transform:translateX(-50%);
}
.q13-arrow.show { display:block; }
.q13-arrow svg {
  width:68px; height:68px;
  stroke:var(--green-abs); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; fill:none;
  filter: drop-shadow(0 2px 6px rgba(30,132,73,.35));
}

/* ── LABEL ROW ───────────────────────────────────────────── */
#labelsRow {
  display:flex; gap:7px;
  padding:8px 2px 0 2px;
  height:82px; flex-shrink:0;
  align-items:flex-start;
}

.bar-lbl { flex:1; display:flex; justify-content:center; align-items:flex-start; min-width:0; overflow:hidden; }
.bar-lbl span {
  font-size:.88rem; font-weight:600; font-family:var(--fbody); color:var(--ink-soft);
  writing-mode:vertical-rl; text-orientation:mixed; transform:rotate(180deg);
  line-height:1; white-space:nowrap; letter-spacing:.01em;
}

/* ── LEGEND ──────────────────────────────────────────────── */
#legend {
  height:28px; padding:0 28px;
  display:flex; align-items:center; gap:20px;
  background:var(--bg); border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.legend-item { display:flex; align-items:center; gap:7px; }
.legend-swatch {
  width:22px; height:14px; border-radius:3px; flex-shrink:0;
}
.legend-swatch.green { background:var(--green); }
.legend-swatch.red {
  background:var(--red);
  background-image:repeating-linear-gradient(135deg,transparent 0,transparent 5px,rgba(0,0,0,.22) 5px,rgba(0,0,0,.22) 7px);
}
.legend-item span { font-size:.75rem; font-weight:400; color:var(--ink-soft); letter-spacing:.01em; }

/* ── EMPTY STATE ─────────────────────────────────────────── */
#emptyState {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:6px; color:var(--ink-faint);
}
#emptyState p     { font-size:.88rem; font-weight:300; }
#emptyState small { font-size:.7rem; font-family:var(--fmono); }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand">
      <h1>Hans Rosling</h1>
      <span class="sub">Factfulness Quiz · Dashboard</span>
    </div>
    <div class="controls">
      <label class="toggle-group">
        <span>Números Absolutos</span>
        <div class="switch">
          <input type="checkbox" id="absToggle"/>
          <span class="track"></span>
        </div>
      </label>
      <button class="btn-update" id="updateBtn" onclick="fetchData()">
        Atualizar Dashboard
      </button>
    </div>
  </header>

  <div id="statusBar">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Clique em "Atualizar Dashboard" para carregar os dados.</span>
  </div>

  <div id="legend">
    <div class="legend-item">
      <div class="legend-swatch green"></div>
      <span>Respostas corretas</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch red"></div>
      <span>Respostas incorretas</span>
    </div>
  </div>

  <div id="chartArea">
    <div id="yAxis"></div>
    <div id="barsContainer">
      <div id="gridAndBars">
        <div id="emptyState">
          <p>Nenhum dado carregado</p>
          <small>Pressione "Atualizar Dashboard" para buscar os resultados</small>
        </div>
        <div id="barsRow"></div>
      </div>
      <div id="labelsRow"></div>
    </div>
  </div>

</div>
<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyhReXh4SduWqfRMX9pYLtl24OF75gucv84ybsdNaKJhK_MVzDmUfp51JRKfXa5qlN_/exec';
let currentData = null;

document.getElementById('absToggle').addEventListener('change', () => {
  if (currentData) renderChart(currentData);
});

async function fetchData() {
  const btn = document.getElementById('updateBtn');
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  btn.disabled = true; btn.textContent = 'Carregando…';
  dot.className = 'dot wait'; txt.textContent = 'Buscando dados na planilha…';
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?t=' + Date.now(), { cache:'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    currentData = data;
    renderChart(data);
    dot.className = 'dot ok';
    const now = new Date().toLocaleString('pt-BR');
    const n = data.total;
    txt.textContent = `${n} resposta${n!==1?'s':''} · Atualizado em ${now}`;
  } catch(e) {
    dot.className = 'dot err';
    txt.textContent = 'Erro ao conectar. Verifique a URL do Apps Script e tente novamente.';
    console.error(e);
  } finally {
    btn.disabled = false; btn.textContent = 'Atualizar Dashboard';
  }
}

function renderChart(data) {
  const isAbs = document.getElementById('absToggle').checked;
  const barsRow   = document.getElementById('barsRow');
  const labelsRow = document.getElementById('labelsRow');
  const yAxis     = document.getElementById('yAxis');
  const gridBars  = document.getElementById('gridAndBars');
  const emptyEl   = document.getElementById('emptyState');

  /* clear */
  gridBars.querySelectorAll('.grid-line').forEach(el => el.remove());
  barsRow.innerHTML   = '';
  labelsRow.innerHTML = '';
  yAxis.innerHTML     = '';

  const total   = data.total;
  const correct = data.correct;

  if (total === 0) { emptyEl.style.display = 'flex'; return; }
  emptyEl.style.display = 'none';

  /* ── scale ── */
  let maxScale, steps, fmt;
  if (isAbs) {
    const maxVal = Math.max(...correct, 1);
    maxScale = Math.ceil(maxVal / 10) * 10 || 10;
    steps = 5; fmt = v => v;
  } else {
    maxScale = 100; steps = 4; fmt = v => v + '%';
  }

  /* grid + y ticks */
  for (let s = steps; s >= 0; s--) {
    const val = Math.round((maxScale / steps) * s);
    const pctFromTop = ((maxScale - val) / maxScale) * 100;

    const gl = document.createElement('div');
    gl.className = 'grid-line';
    gl.style.top = pctFromTop + '%';
    gridBars.appendChild(gl);

    const yt = document.createElement('div');
    yt.className = 'y-tick';
    yt.textContent = fmt(val);
    yAxis.appendChild(yt);
  }

  /* ── bars ── */
  for (let i = 0; i < 13; i++) {
    const isQ13 = (i === 12);
    const col = document.createElement('div');
    col.className = 'bar-col';

    if (isAbs) {
      /* ── ABSOLUTE MODE ── */
      const val = correct[i];
      const hPct = (val / maxScale) * 100;
      const cls  = isQ13 ? 'q13' : 'q1-12';

      if (isQ13) {
        const arrow = document.createElement('div');
        arrow.className = 'q13-arrow show';
        arrow.innerHTML = `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="6 13 12 19 18 13"/></svg>`;
        col.appendChild(arrow);
      }

      const va = document.createElement('div');
      va.className = 'val-above';
      va.textContent = val;
      col.appendChild(va);

      const track = document.createElement('div');
      track.className = 'bar-track';

      const fill = document.createElement('div');
      fill.className = `fill-abs ${cls}`;
      fill.style.height = hPct.toFixed(2) + '%';

      track.appendChild(fill);

      /* label centered in the filled segment */
      if (val > 0) {
        const lb = document.createElement('div');
        lb.className = 'seg-label';
        lb.style.top = (100 - hPct / 2).toFixed(1) + '%';
        lb.textContent = val;
        track.appendChild(lb);
      }

      col.appendChild(track);

    } else {
      /* ── PERCENTAGE MODE ── */
      const pct    = total > 0 ? (correct[i] / total) * 100 : 0;
      const errPct = 100 - pct;

      const va = document.createElement('div');
      va.className = 'val-above';
      va.textContent = pct.toFixed(0) + '%';
      col.appendChild(va);

      const track = document.createElement('div');
      track.className = 'bar-track';

      /* red from top */
      const red = document.createElement('div');
      red.className = 'fill-red';
      red.style.height = errPct.toFixed(2) + '%';

      /* green from bottom */
      const green = document.createElement('div');
      green.className = 'fill-green';
      green.style.height = pct.toFixed(2) + '%';

      track.appendChild(red);
      track.appendChild(green);

      /* labels: absolutely positioned in track, centered in each segment */
      if (errPct > 0) {
        const lr = document.createElement('div');
        lr.className = 'seg-label';
        lr.style.top = (errPct / 2).toFixed(1) + '%';
        lr.textContent = errPct.toFixed(0) + '%';
        track.appendChild(lr);
      }
      if (pct > 0) {
        const lg = document.createElement('div');
        lg.className = 'seg-label';
        lg.style.top = (100 - pct / 2).toFixed(1) + '%';
        lg.textContent = pct.toFixed(0) + '%';
        track.appendChild(lg);
      }

      col.appendChild(track);
    }

    barsRow.appendChild(col);

    /* label below */
    const lw = document.createElement('div');
    lw.className = 'bar-lbl';
    const ls = document.createElement('span');
    ls.textContent = 'Questão ' + (i + 1);
    lw.appendChild(ls);
    labelsRow.appendChild(lw);
  }
}
</script>
</body>
</html>
